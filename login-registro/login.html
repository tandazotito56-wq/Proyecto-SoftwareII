<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>INICIAR SESIÓN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="login-card">
                    <h1 class="text-center mb-3"><i class="bi bi-box-arrow-in-right"></i> INICIO</h1>
                    <form>
                        <!-- CorreoElectronico -->
                        <div class="mb-3">
                            <label for="email" class="form-label"><i class="bi bi-envelope"></i> Correo:</label>
                            <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com">
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <label for="password" class="form-label"><i class="bi bi-lock"></i> Clave:</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password">
                                <button class="btn btn-outline-light" type="button" id="togglePassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Olvidaste contraseña -->
                        <div class="mb-3">
                            <a href="#" class="text-end d-block">¿Olvidaste tu clave?</a>
                        </div>

                        <!-- Boton de enviar -->
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-login btn-lg"><i class="bi bi-box-arrow-in-right"></i> Iniciar</button>
                        </div>

                        <!-- Registro -->
                        <div class="text-center mt-3">
                            <p>¿Sin cuenta? <a href="registro.html">Regístrate</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
